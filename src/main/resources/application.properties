spring.application.name=demo

# Database URL - format is jdbc:mysql://<host>:<port>/<database_name>
spring.datasource.url=jdbc:mysql://localhost:3306/sahms

# Database Credentials
spring.datasource.username=root
spring.datasource.password=charan@1201

# Driver Class (Optional in newer Spring Boot versions as it auto-detects)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Properties
# 'update' will create/modify tables automatically. Use 'validate' for production!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Core Connection Settings

# Protocol and Authentication
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Optional: Encoding and Debugging
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.debug=false
